services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novel123
      POSTGRES_DB: novel_reader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel -d novel_reader"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
