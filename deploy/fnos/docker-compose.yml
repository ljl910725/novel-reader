services:
  postgres:
    image: postgres:16-alpine
    container_name: novel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: novel_reader
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U novel -d novel_reader']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: novel-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data

  api:
    build:
      context: ../..
      dockerfile: deploy/fnos/Dockerfile.api
    container_name: novel-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://novel:${POSTGRES_PASSWORD}@postgres:5432/novel_reader
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN}
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: ../..
      dockerfile: deploy/fnos/Dockerfile.web
    container_name: novel-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  pgdata:
  redisdata:
  uploads:
